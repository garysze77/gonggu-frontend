<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GongGu 港股AI預測系統</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans HK', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    
    /* Header */
    header {
      text-align: center;
      padding: 30px 0;
    }
    h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #00d4ff, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #94a3b8; margin-top: 10px; }
    
    /* Search Box */
    .search-box {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 30px;
      margin: 30px 0;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .search-title {
      font-size: 1.2rem;
      margin-bottom: 15px;
      color: #00d4ff;
    }
    .search-row {
      display: flex;
      gap: 10px;
    }
    input[type="text"] {
      flex: 1;
      padding: 15px 20px;
      font-size: 1.1rem;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #00d4ff;
    }
    input[type="text"]::placeholder {
      color: #64748b;
    }
    button {
      padding: 15px 30px;
      font-size: 1.1rem;
      background: linear-gradient(135deg, #00d4ff, #7c3aed);
      border: none;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.05);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Search Result */
    .result-box {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 30px;
      margin: 20px 0;
      border: 1px solid rgba(255,255,255,0.1);
      display: none;
    }
    .result-box.show { display: block; }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .stock-name { font-size: 1.5rem; font-weight: bold; }
    .stock-price { font-size: 1.2rem; color: #94a3b8; }
    .prediction {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 20px;
      border-radius: 12px;
      margin: 15px 0;
    }
    .prediction.buy { background: rgba(34, 134, 54, 0.2); border: 1px solid #238636; }
    .prediction.sell { background: rgba(218, 54, 51, 0.2); border: 1px solid #da3633; }
    .pred-icon { font-size: 2.5rem; }
    .pred-text { font-size: 1.5rem; font-weight: bold; }
    .confidence-bar {
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      height: 20px;
      margin: 10px 0;
      overflow: hidden;
    }
    .confidence-fill {
      height: 100%;
      border-radius: 8px;
      transition: width 0.5s;
    }
    .confidence-fill.buy { background: #238636; }
    .confidence-fill.sell { background: #da3633; }
    .confidence-text {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: #94a3b8;
    }
    .error { color: #ef4444; padding: 20px; text-align: center; }
    
    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin: 30px 0;
    }
    .stat-box {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .stat-value { font-size: 2rem; font-weight: bold; }
    .stat-label { color: #94a3b8; font-size: 0.9rem; }
    .stat-box.buy .stat-value { color: #22c55e; }
    .stat-box.sell .stat-value { color: #ef4444; }
    
    /* Stock List */
    .stock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 30px;
    }
    .stock-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 15px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .stock-symbol { font-weight: bold; font-size: 1.1rem; }
    .stock-name-sm { color: #94a3b8; font-size: 0.9rem; }
    .stock-signal {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      margin-top: 10px;
    }
    .signal-buy { background: #238636; }
    .signal-sell { background: #da3633; }
    .signal-hold { background: #f59e0b; }
    
    .ml-indicator {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      margin-left: 5px;
    }
    .ml-buy { background: #238636; }
    .ml-sell { background: #da3633; }
    
    .loading {
      text-align: center;
      padding: 30px;
      color: #94a3b8;
    }
    
    /* Navigation */
    .nav {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .nav-btn {
      padding: 10px 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
    }
    .nav-btn.active {
      background: #00d4ff;
      border-color: #00d4ff;
    }
    
    .section { display: none; }
    .section.active { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎯 GongGu 港股AI預測系統</h1>
      <p class="subtitle">🚀 Powered by AI + Machine Learning</p>
    </header>
    
    <!-- Navigation -->
    <div class="nav">
      <button class="nav-btn active" onclick="showSection('stocks')">全部股票</button>
      <button class="nav-btn" onclick="showSection('search')">搜尋股票</button>
    </div>
    
    <!-- Search Section -->
    <div id="search-section" class="section">
      <div class="search-box">
        <div class="search-title">🔍 搜尋股票預測</div>
        <div class="search-row">
          <input type="text" id="stockCode" placeholder="輸入股票代碼 (例如: 0700, 9988)" maxlength="4">
          <button onclick="searchStock()" id="searchBtn">搜尋</button>
        </div>
      </div>
      
      <!-- Search Result -->
      <div id="resultBox" class="result-box">
        <div id="resultContent"></div>
      </div>
    </div>
    
    <!-- Stocks Section -->
    <div id="stocks-section" class="section active">
      <div class="stats">
        <div class="stat-box buy">
          <div class="stat-value" id="buyCount">-</div>
          <div class="stat-label">買入信號</div>
        </div>
        <div class="stat-box sell">
          <div class="stat-value" id="sellCount">-</div>
          <div class="stat-label">賣出信號</div>
        </div>
      </div>
      
      <div class="stock-grid" id="stockList">
        <div class="loading">載入中...</div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://api.gonggu.app';
    const PREDICT_API = 'https://api.gonggu.app/api/predict';
    const API_KEY = 'gonggu-secret-key-2026';
    
    // Show/hide sections
    function showSection(section) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      
      if (section === 'search') {
        document.getElementById('search-section').classList.add('active');
        document.querySelectorAll('.nav-btn')[1].classList.add('active');
      } else {
        document.getElementById('stocks-section').classList.add('active');
        document.querySelectorAll('.nav-btn')[0].classList.add('active');
      }
    }
    
    // Search stock
    async function searchStock() {
      const code = document.getElementById('stockCode').value.trim();
      if (!code) return;
      
      const btn = document.getElementById('searchBtn');
      const resultBox = document.getElementById('resultBox');
      const resultContent = document.getElementById('resultContent');
      
      btn.disabled = true;
      btn.textContent = '載入中...';
      resultBox.classList.remove('show');
      
      try {
        // Fetch from predict API
        const url = `${PREDICT_API}?symbol=${code}&api_key=${API_KEY}`;
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.error) {
          resultContent.innerHTML = `<div class="error">${data.error}</div>`;
        } else {
          const isBuy = data.ml_prediction === 'BUY';
          resultContent.innerHTML = `
            <div class="result-header">
              <div>
                <div class="stock-name">${data.symbol}.HK - ${data.name}</div>
                <div class="stock-price">$ ${data.price}</div>
              </div>
            </div>
            <div class="prediction ${isBuy ? 'buy' : 'sell'}">
              <span class="pred-icon">${isBuy ? '🟢' : '🔴'}</span>
              <span class="pred-text">${data.ml_prediction}</span>
            </div>
            <div class="confidence-bar">
              <div class="confidence-fill ${isBuy ? 'buy' : 'sell'}" style="width: ${data.ml_confidence}%"></div>
            </div>
            <div class="confidence-text">
              <span>信心: ${data.ml_confidence}%</span>
              <span>買: ${data.buy_probability}% | 賣: ${data.sell_probability}%</span>
            </div>
          `;
        }
        
        resultBox.classList.add('show');
      } catch (error) {
        resultContent.innerHTML = `<div class="error">載入失敗: ${error.message}</div>`;
        resultBox.classList.add('show');
      }
      
      btn.disabled = false;
      btn.textContent = '搜尋';
    }
    
    // Enter key to search
    document.getElementById('stockCode').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') searchStock();
    });
    
    // Load all stocks
    async function loadStocks() {
      try {
        const response = await fetch(API_URL + '/api/stocks');
        const data = await response.json();
        
        document.getElementById('buyCount').textContent = data.ml_buy_count || 0;
        document.getElementById('sellCount').textContent = data.ml_sell_count || 0;
        
        const grid = document.getElementById('stockList');
        grid.innerHTML = data.all_stocks.map(stock => {
          const hasML = stock.ml_prediction;
          const isBuy = stock.ml_prediction === 'BUY';
          
          return `
            <div class="stock-card">
              <div class="stock-symbol">${stock.symbol}.HK</div>
              <div class="stock-name-sm">${stock.name}</div>
              <div>$${stock.close}</div>
              <span class="stock-signal signal-${stock.signal.toLowerCase()}">${stock.signal}</span>
              ${hasML ? `<span class="ml-indicator ml-${isBuy ? 'buy' : 'sell'}">🤖 ${stock.ml_prediction} ${(stock.ml_confidence || 0).toFixed(0)}%</span>` : ''}
            </div>
          `;
        }).join('');
      } catch (error) {
        document.getElementById('stockList').innerHTML = '<div class="error">載入失敗，請稍後再試</div>';
      }
    }
    
    // Init
    loadStocks();
  </script>
</body>
</html>
